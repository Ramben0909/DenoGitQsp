<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="5px" height="200px" width="400px" cellpadding="20px" cellspacing="5px" style="border-collapse: collapse;">
        <caption>Monthly Financial Overview</caption>
        <thead>
            <tr>
                <th>SLNO</th>
                <th>jan</th>
                <th>feb</th>
            </tr>
        </thead>
        <tbody>
             <tr>
                <td>Salary</td>
                <td>1000</td>
                <td>1500</td>
             </tr>
             <tr>
                <td>Expense</td>
                <td>500</td>
                <td>700</td>
             </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>savings</td>
                <td>500</td>
                <td>800</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
